<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RTEACB — 主题启动页</title>
  <link rel="icon" type="image/png" sizes="48x48" href="https://img.icons8.com/ios-filled/50/888888/sun.png">
  <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/96/888888/sun.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="light">

<div id="moon-overlay">
  <div class="moon-light-beam"></div>
  <div class="stars"><canvas id="stars-canvas"></canvas></div>
  <div class="moon-canvas-wrap">
    <canvas id="moon-canvas" width="480" height="480"></canvas>
  </div>
</div>

<div id="leaves-overlay">
  <video id="leaves-video" src="assets/leaves.mp4" autoplay muted loop playsinline></video>
</div>

<div id="rain-overlay">
  <div class="rain-fog"></div>
  <canvas id="rain-canvas"></canvas>
</div>

<div id="snow-overlay">
  <div class="snow-glow"></div>
  <canvas id="snow-canvas"></canvas>
</div>

<audio id="forest-audio" src="assets/forest.mp3" loop preload="auto"></audio>

<div class="mode-indicator">
  <div class="mode-dot" data-mode="day" title="Day (D)"></div>
  <div class="mode-dot" data-mode="sunny" title="Sunny (S)"></div>
  <div class="mode-dot" data-mode="night" title="Night (N)"></div>
  <div class="mode-dot" data-mode="midnight" title="Moonlight (M)"></div>
  <div class="mode-dot" data-mode="rain" title="Rainy (R)"></div>
  <div class="mode-dot" data-mode="snow" title="Snowy (W)"></div>
</div>

<div class="page">
  <header class="header">
    <div class="logo">RTEACB</div>
    <div class="mode-shortcuts" role="toolbar" aria-label="主题切换">
      <button type="button" class="mode-key" data-mode="day" title="白昼">D</button><span class="mode-sep" aria-hidden="true">·</span>
      <button type="button" class="mode-key" data-mode="sunny" title="晴朗">S</button><span class="mode-sep" aria-hidden="true">·</span>
      <button type="button" class="mode-key" data-mode="night" title="夜色">N</button><span class="mode-sep" aria-hidden="true">·</span>
      <button type="button" class="mode-key" data-mode="midnight" title="月光">M</button><span class="mode-sep" aria-hidden="true">·</span>
      <button type="button" class="mode-key" data-mode="rain" title="雨天">R</button><span class="mode-sep" aria-hidden="true">·</span>
      <button type="button" class="mode-key" data-mode="snow" title="雪天">S</button>
    </div>
  </header>

  <section class="hero">
    <div class="hero-primary">
      <h1 id="greeting">你好</h1>
      <p class="hero-time" id="clock" aria-live="polite"></p>
    </div>
    <aside class="hero-weather" id="hero-weather" aria-label="天气">
      <div class="weather-body">
        <div class="weather-head-row">
          <div class="weather-icon-wrap" aria-hidden="true">
            <img class="weather-icon" id="weather-icon" alt="" width="36" height="36" decoding="async" />
          </div>
          <div class="weather-text-stack">
            <div class="weather-temp" id="weather-temp">—</div>
            <div class="weather-desc" id="weather-desc">加载中…</div>
          </div>
        </div>
        <div class="weather-meta" id="weather-meta"></div>
      </div>
    </aside>
  </section>

  <div class="divider"></div>

  <section class="section">
    <div class="section-head">
      <div class="section-title">快捷方式</div>
      <button type="button" class="ghost-btn" id="btn-new-shortcut" title="新增快捷方式">新增</button>
    </div>
    <div id="launch-empty" class="launch-empty hidden">暂无快捷方式 — 点击「新增」或右键菜单添加。</div>
    <div class="launch-grid" id="launch-grid" role="navigation" aria-label="快捷方式网格，可拖动调整顺序"></div>
  </section>

  <div class="footer">静态页面 · <a href="https://icons8.com/icons" target="_blank" rel="noopener noreferrer">图标 Icons8</a> · Open-Meteo · CSS Houdini</div>
</div>

<div class="mode-toast" id="toast"></div>

<div id="shortcut-ctx-menu" class="shortcut-ctx-menu hidden" role="menu" aria-hidden="true">
  <button type="button" class="shortcut-ctx-item" role="menuitem" data-ctx-action="edit">编辑</button>
  <button type="button" class="shortcut-ctx-item shortcut-ctx-item-danger" role="menuitem" data-ctx-action="delete">删除</button>
</div>

<button type="button" class="audio-toggle" id="audio-toggle" title="环境音开关">♫</button>

<div id="edit-panel" class="edit-panel" aria-hidden="true">
  <div class="edit-panel-backdrop" id="edit-backdrop"></div>
  <div class="edit-panel-sheet" role="dialog" aria-labelledby="edit-title">
    <div class="edit-panel-header">
      <h2 id="edit-title" class="edit-title">新增快捷方式</h2>
      <button type="button" class="ghost-btn" id="btn-close-edit">保存</button>
    </div>
    <p class="edit-hint" id="edit-hint-add">填写一项新快捷方式。名称、网址必填。远程图标仅使用 <a href="https://icons8.com/icons" target="_blank" rel="noopener noreferrer">Icons8</a> 的 <strong>iOS Filled</strong>（<code>…/ios-filled/96/图标名.png</code>，线面实心单色）；留空则按网址自动匹配。支持 Emoji 或本地上传覆盖。数据保存在 localStorage。</p>
    <p class="edit-hint hidden" id="edit-hint-edit">修改当前快捷方式。远程图标规则与新增相同：Icons8 iOS Filled，否则按网址匹配。</p>

    <form id="form-shortcut-add" class="shortcut-form" autocomplete="off">
      <label class="shortcut-form-label" for="sfa-title">名称</label>
      <input class="shortcut-form-input" type="text" id="sfa-title" placeholder="例如：邮箱" />
      <label class="shortcut-form-label" for="sfa-url">网址</label>
      <input class="shortcut-form-input" type="text" id="sfa-url" placeholder="example.com 或 https://…" />
      <label class="shortcut-form-label" for="sfa-emoji">Emoji 图标</label>
      <input class="shortcut-form-input" type="text" id="sfa-emoji" placeholder="单个或几个 Emoji" />
      <label class="shortcut-form-label" for="sfa-iconurl">图片地址（可选，优先于 Emoji）</label>
      <input class="shortcut-form-input" type="text" id="sfa-iconurl" placeholder="https://img.icons8.com/ios-filled/96/github.png" />
      <div class="shortcut-form-actions">
        <input type="file" id="sfa-file" class="file-input-hidden" accept="image/*" />
        <button type="button" class="ghost-btn" id="sfa-btn-upload">上传图标</button>
        <button type="button" class="ghost-btn" id="sfa-btn-clear-img">清除自定义图</button>
      </div>
    </form>

    <form id="form-shortcut-edit" class="shortcut-form hidden" autocomplete="off">
      <label class="shortcut-form-label" for="sfe-title">名称</label>
      <input class="shortcut-form-input" type="text" id="sfe-title" placeholder="例如：邮箱" />
      <label class="shortcut-form-label" for="sfe-url">网址</label>
      <input class="shortcut-form-input" type="text" id="sfe-url" placeholder="example.com 或 https://…" />
      <label class="shortcut-form-label" for="sfe-emoji">Emoji 图标</label>
      <input class="shortcut-form-input" type="text" id="sfe-emoji" placeholder="单个或几个 Emoji" />
      <label class="shortcut-form-label" for="sfe-iconurl">图片地址（可选，优先于 Emoji）</label>
      <input class="shortcut-form-input" type="text" id="sfe-iconurl" placeholder="https://img.icons8.com/ios-filled/96/github.png" />
      <div class="shortcut-form-actions">
        <input type="file" id="sfe-file" class="file-input-hidden" accept="image/*" />
        <button type="button" class="ghost-btn" id="sfe-btn-upload">上传图标</button>
        <button type="button" class="ghost-btn" id="sfe-btn-clear-img">清除自定义图</button>
        <button type="button" class="ghost-btn danger" id="sfe-btn-delete">删除此项</button>
      </div>
    </form>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
